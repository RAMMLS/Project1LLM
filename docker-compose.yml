version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    # Если нужна поддержка GPU в докере, раскомментируйте блок ниже (требуется nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
        NEXT_PUBLIC_STREAM_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_STREAM_API_URL=http://localhost:8000/api/v1
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
